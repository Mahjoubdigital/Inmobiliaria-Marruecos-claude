<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Inmobiliaria Marruecos — Asistente Virtual</title>
<style>
  :root{
    --gold:#c9a961;
    --gold-light:#e0c785;
    --gold-dark:#a8863f;
    --brown:#2c1810;
    --brown-light:#4a2c1a;
    --brown-soft:#3d2416;
    --cream:#f7f2e9;
    --white:#fffdf9;
    --gray:#8a7a68;
    --error:#c0392b;
    --success:#3c7a4f;
    --radius:14px;
    --shadow:0 8px 30px rgba(44,24,16,.18);
    --shadow-sm:0 2px 10px rgba(44,24,16,.12);
    --font-display:'Playfair Display', Georgia, 'Times New Roman', serif;
    --font-body:'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:var(--font-body);
    background:linear-gradient(160deg,#efe6d3 0%, #e5d7ba 45%, #d9c69a 100%);
    color:var(--brown);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px;
  }
  body[dir="rtl"]{direction:rtl;}

  #app{
    width:100%;
    max-width:480px;
    height:min(880px, 94vh);
    background:var(--white);
    border-radius:22px;
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    border:1px solid rgba(201,169,97,.35);
    position:relative;
  }

  /* HEADER */
  #header{
    background:linear-gradient(135deg, var(--brown) 0%, var(--brown-light) 60%, var(--brown-soft) 100%);
    color:var(--cream);
    padding:22px 22px;
    position:relative;
    flex-shrink:0;
  }
  #header::after{
    content:"";
    position:absolute; left:0; right:0; bottom:0; height:3px;
    background:linear-gradient(90deg, transparent, var(--gold) 20%, var(--gold-light) 50%, var(--gold) 80%, transparent);
  }
  #headerTop{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  #brand{display:flex; align-items:center; gap:10px; min-width:0;}
  #brandMark{
    width:38px; height:38px; border-radius:10px;
    background:linear-gradient(135deg, var(--gold-light), var(--gold-dark));
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700; color:var(--brown); font-size:18px;
    flex-shrink:0;
    box-shadow:0 2px 8px rgba(0,0,0,.25);
  }
  #brandText{min-width:0;}
  #brandText h1{
    font-family:var(--font-display);
    font-size:16.5px; font-weight:700; letter-spacing:.2px; color:var(--gold-light);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  #brandText p{font-size:11px; color:#d8c8ae; opacity:.85; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  #headerActions{display:flex; align-items:center; gap:8px; flex-shrink:0;}
  #resetBtn{
    background:rgba(201,169,97,.15);
    border:1px solid rgba(201,169,97,.5);
    color:var(--gold-light);
    border-radius:8px;
    padding:7px 10px;
    font-size:12px;
    cursor:pointer;
    display:flex; align-items:center; gap:5px;
    transition:.2s ease;
    font-family:var(--font-body);
  }
  #resetBtn:hover{background:rgba(201,169,97,.3); transform:translateY(-1px);}
  #resetBtn svg{width:13px; height:13px;}

  #langRow{
    display:flex; gap:6px; margin-top:12px; overflow-x:auto; padding-bottom:2px;
    scrollbar-width:thin;
  }
  #langRow::-webkit-scrollbar{height:4px;}
  #langRow::-webkit-scrollbar-thumb{background:rgba(201,169,97,.4); border-radius:4px;}
  .langBtn{
    flex-shrink:0;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(201,169,97,.3);
    border-radius:8px;
    padding:5px 9px;
    font-size:16px;
    cursor:pointer;
    transition:.18s ease;
    line-height:1;
    display:flex; align-items:center; gap:5px;
  }
  .langBtn span.code{font-size:9.5px; color:#d8c8ae; font-weight:600; letter-spacing:.3px;}
  .langBtn:hover{background:rgba(201,169,97,.2); transform:translateY(-1px);}
  .langBtn.active{background:var(--gold); border-color:var(--gold-light);}
  .langBtn.active span.code{color:var(--brown);}

  #progressWrap{height:4px; background:rgba(0,0,0,.15); flex-shrink:0;}
  #progressBar{height:100%; width:0%; background:linear-gradient(90deg, var(--gold-dark), var(--gold-light)); transition:width .4s ease;}

  /* CHAT AREA */
  #chatArea{
    flex:1;
    overflow-y:auto;
    padding:18px 16px 8px;
    display:flex;
    flex-direction:column;
    gap:12px;
    background:
      radial-gradient(circle at 20% 10%, rgba(201,169,97,.06), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(201,169,97,.05), transparent 40%),
      var(--cream);
  }
  #chatArea::-webkit-scrollbar{width:6px;}
  #chatArea::-webkit-scrollbar-thumb{background:rgba(201,169,97,.5); border-radius:6px;}

  .msgRow{display:flex; animation:slideIn .35s ease;}
  .msgRow.bot{justify-content:flex-start;}
  .msgRow.user{justify-content:flex-end;}
  @keyframes slideIn{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

  .bubble{
    max-width:82%;
    padding:11px 14px;
    border-radius:16px;
    font-size:14.5px;
    line-height:1.5;
    box-shadow:var(--shadow-sm);
    white-space:pre-line;
  }
  .msgRow.bot .bubble{
    background:var(--white);
    border:1px solid rgba(201,169,97,.35);
    border-bottom-left-radius:4px;
    color:var(--brown);
  }
  body[dir="rtl"] .msgRow.bot .bubble{border-bottom-left-radius:16px; border-bottom-right-radius:4px;}
  .msgRow.user .bubble{
    background:linear-gradient(135deg, var(--brown), var(--brown-light));
    color:var(--cream);
    border-bottom-right-radius:4px;
  }
  body[dir="rtl"] .msgRow.user .bubble{border-bottom-right-radius:16px; border-bottom-left-radius:4px;}
  .bubble b{color:var(--gold-dark);}
  .msgRow.user .bubble b{color:var(--gold-light);}

  .typingBubble{display:flex; gap:4px; padding:14px 16px;}
  .typingBubble span{width:6px; height:6px; border-radius:50%; background:var(--gold-dark); opacity:.5; animation:blink 1.2s infinite;}
  .typingBubble span:nth-child(2){animation-delay:.2s;}
  .typingBubble span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.25; transform:scale(.85);} 40%{opacity:1; transform:scale(1);}}

  /* INPUT AREA */
  #inputArea{
    border-top:1px solid rgba(201,169,97,.3);
    background:var(--white);
    padding:12px 14px 14px;
    flex-shrink:0;
    max-height:46vh;
    overflow-y:auto;
  }
  .optionsGrid{display:flex; flex-wrap:wrap; gap:8px;}
  .optBtn{
    flex:1 1 auto;
    min-width:calc(50% - 4px);
    background:var(--cream);
    border:1.5px solid rgba(201,169,97,.5);
    color:var(--brown);
    padding:10px 12px;
    border-radius:11px;
    font-size:13.5px;
    cursor:pointer;
    transition:.18s ease;
    font-family:var(--font-body);
    display:flex; align-items:center; gap:8px;
    text-align:start;
  }
  .optBtn .ic{font-size:16px; flex-shrink:0;}
  .optBtn:hover{background:var(--gold); border-color:var(--gold-dark); transform:translateY(-2px); box-shadow:0 4px 10px rgba(201,169,97,.4);}
  .optBtn.wide{min-width:100%;}
  .optBtn.selected{background:var(--gold); border-color:var(--gold-dark); font-weight:600;}
  .optBtn.selected::after{content:" ✓"; margin-inline-start:auto;}

  .chipsRow{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px;}
  .chip{
    background:rgba(201,169,97,.15);
    border:1px solid rgba(201,169,97,.5);
    color:var(--brown-light);
    padding:6px 11px;
    border-radius:20px;
    font-size:12.5px;
    cursor:pointer;
    transition:.15s ease;
  }
  .chip:hover{background:var(--gold); color:var(--brown);}

  .textInputRow{display:flex; gap:8px; align-items:flex-end;}
  .textInputRow input{
    flex:1;
    border:1.5px solid rgba(201,169,97,.5);
    border-radius:11px;
    padding:11px 13px;
    font-size:14.5px;
    font-family:var(--font-body);
    color:var(--brown);
    background:var(--cream);
    outline:none;
    transition:.15s ease;
  }
  .textInputRow input:focus{border-color:var(--gold-dark); box-shadow:0 0 0 3px rgba(201,169,97,.2);}
  .sendBtn{
    background:linear-gradient(135deg, var(--gold-dark), var(--gold));
    border:none;
    color:var(--brown);
    width:44px; height:44px;
    border-radius:11px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    transition:.18s ease;
    font-weight:700;
  }
  .sendBtn:hover{transform:translateY(-2px) scale(1.03); box-shadow:0 4px 12px rgba(201,169,97,.5);}
  .sendBtn svg{width:19px; height:19px;}
  body[dir="rtl"] .sendBtn svg{transform:scaleX(-1);}

  .errMsg{color:var(--error); font-size:12px; margin-top:6px; display:none; align-items:center; gap:5px;}
  .errMsg.show{display:flex;}

  .rowBtns{display:flex; gap:8px; margin-top:10px;}
  .btnPrimary,.btnGhost{
    flex:1;
    padding:11px 14px;
    border-radius:11px;
    font-size:13.5px;
    cursor:pointer;
    font-weight:600;
    font-family:var(--font-body);
    transition:.18s ease;
    border:none;
  }
  .btnPrimary{background:linear-gradient(135deg, var(--gold-dark), var(--gold)); color:var(--brown);}
  .btnPrimary:hover{transform:translateY(-2px); box-shadow:0 4px 12px rgba(201,169,97,.5);}
  .btnGhost{background:transparent; border:1.5px solid rgba(201,169,97,.5); color:var(--brown-light);}
  .btnGhost:hover{background:rgba(201,169,97,.1);}

  .backLink{
    display:inline-flex; align-items:center; gap:4px;
    font-size:12px; color:var(--gray); cursor:pointer; margin-bottom:10px; background:none; border:none; font-family:var(--font-body);
  }
  .backLink:hover{color:var(--brown);}

  .hint{font-size:11.5px; color:var(--gray); margin-bottom:8px;}

  .summaryCard{background:var(--cream); border:1px solid rgba(201,169,97,.4); border-radius:12px; padding:12px 14px; margin-bottom:6px;}
  .summaryRow{display:flex; justify-content:space-between; gap:10px; padding:6px 0; border-bottom:1px dashed rgba(201,169,97,.35); font-size:12.5px;}
  .summaryRow:last-child{border-bottom:none;}
  .summaryRow .k{color:var(--gray); flex-shrink:0;}
  .summaryRow .v{font-weight:600; text-align:end;}

  .whatsBtn{
    display:flex; align-items:center; justify-content:center; gap:9px;
    background:linear-gradient(135deg, #25D366, #1eb956);
    color:#fff; padding:13px; border-radius:12px; border:none;
    font-size:14.5px; font-weight:700; cursor:pointer; width:100%;
    transition:.18s ease; margin-top:4px;
  }
  .whatsBtn:hover{transform:translateY(-2px); box-shadow:0 6px 16px rgba(37,211,102,.4);}
  .whatsBtn svg{width:20px; height:20px;}

  .copyRow{margin-top:10px; display:flex; gap:8px;}
  .copyBox{
    background:var(--cream); border:1px solid rgba(201,169,97,.4); border-radius:10px; padding:10px; font-size:11.5px; color:var(--gray); margin-top:8px; max-height:110px; overflow-y:auto; white-space:pre-wrap; display:none;
  }
  .copyBox.show{display:block;}

  #resumeBanner{
    position:absolute; inset:0; background:rgba(44,24,16,.55); backdrop-filter:blur(2px);
    display:flex; align-items:center; justify-content:center; z-index:20; padding:24px;
  }
  #resumeCard{background:var(--white); border-radius:16px; padding:22px; max-width:340px; text-align:center; box-shadow:var(--shadow);}
  #resumeCard h3{font-family:var(--font-display); color:var(--brown); margin-bottom:8px; font-size:18px;}
  #resumeCard p{font-size:13.5px; color:var(--gray); margin-bottom:16px;}

  @media (max-width:600px){
    body{padding:0;}
    #app{max-width:100%; height:100vh; height:100dvh; border-radius:0; border:none;}
  }
</style>
</head>
<body>
<div id="app">

  <div id="header">

</div>

/* =========================================================
   STATE
========================================================= */
let state = {
  lang: "es",
  answers: {},
  answerDisplay: {}, // human-readable labels for summary/whatsapp
  steps: [],
  stepIndex: 0,
  finished: false
};

/* =========================================================
   HELPERS
========================================================= */
function t(){ return I18N[state.lang]; }
function $(sel){ return document.querySelector(sel); }
function el(tag, cls, html){ const e=document.createElement(tag); if(cls) e.className=cls; if(html!==undefined) e.innerHTML=html; return e; }
function escapeHtml(str){ return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      lang: state.lang, answers: state.answers, answerDisplay: state.answerDisplay,
      steps: state.steps, stepIndex: state.stepIndex, finished: state.finished,
      chatHTML: $("#chatArea").innerHTML
    }));
  }catch(e){}
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){ return null; }
}
function clearState(){
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
}

/* =========================================================
   VALIDATIONS
========================================================= */
function validateName(v){
  const s = v.trim();
  if(s.length < 2 || s.length > 60) return false;
  return /^[\p{L}\s'’.-]+$/u.test(s);
}
function validateEmail(v){
  const s = v.trim();
  return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(s);
}
function validatePhone(v){
  const s = v.trim().replace(/[\s()-]/g,'');
  return /^\+?[0-9]{8,15}$/.test(s);
}
function validateZone(v){
  const s = v.trim();
  if(s.length < 2 || s.length > 60) return false;
  return /^[\p{L}\s'’.,-]+$/u.test(s);
}
function validateNumberish(v){
  const s = v.trim();
  if(s.length < 1 || s.length > 20) return false;
  return /^[0-9]+([.,][0-9]+)?\s*(m2|m²)?$/i.test(s) || /^[\p{L}0-9\s.,²m-]+$/u.test(s);
}

/* =========================================================
   STEP DEFINITIONS (order + logic)
========================================================= */
const BASE_STEPS_1 = ["objetivo","tipoPropiedad"];
const BASE_STEPS_2 = ["zona","presupuesto"];
const DETAIL_STEPS = {
  vivienda: ["viviendaSubtipo","viviendaHabitaciones","viviendaBanos","viviendaSuperficie","viviendaExtras","viviendaEstado"],
  villas: ["viviendaHabitaciones","viviendaBanos","viviendaSuperficie","viviendaExtras","viviendaEstado"],
  apartamentos: ["viviendaHabitaciones","viviendaBanos","viviendaSuperficie","viviendaExtras","viviendaEstado"],
  terreno: ["terrenoUso","terrenoSuperficie","terrenoTitulado"],
  comercial: ["comercialSubtipo","comercialSuperficie","comercialPlanta"],
  garaje: ["garajePlazas","garajeTipo","garajeUbicacion"]
};
// tipoPropiedad ids that pre-select a viviendaSubtipo (so we skip re-asking it)
const TIPO_SUBTIPO_PRESET = { villas:"casa_villa", apartamentos:"apartamento" };
const TAIL_STEPS = ["plazo","gestion","nacionalidad","nombre","email","telefono","resumen"];

const CHOICE_STEPS = new Set([
  "objetivo","tipoPropiedad","presupuesto","viviendaSubtipo","viviendaHabitaciones","viviendaBanos",
  "viviendaEstado","terrenoUso","terrenoTitulado","comercialSubtipo","comercialPlanta",
  "garajePlazas","garajeTipo","garajeUbicacion","plazo","gestion",
  "viviendaSuperficie","terrenoSuperficie","comercialSuperficie"
]);
const MULTI_STEPS = new Set(["viviendaExtras"]);
const TEXT_STEPS = new Set(["nombre","email","telefono"]);
const ZONE_STEP = "zona";
const NATION_STEP = "nacionalidad";
const SUMMARY_STEP = "resumen";

/* =========================================================
   RENDER: CHAT MESSAGES
========================================================= */
function addBotMessage(html){
  const row = el("div","msgRow bot");
  const bubble = el("div","bubble", html);
  row.appendChild(bubble);
  $("#chatArea").appendChild(row);
  scrollChatBottom();
  return row;
}
function addUserMessage(text){
  const row = el("div","msgRow user");
  const bubble = el("div","bubble", escapeHtml(text));
  row.appendChild(bubble);
  $("#chatArea").appendChild(row);
  scrollChatBottom();
}
function scrollChatBottom(){
  requestAnimationFrame(()=>{ $("#chatArea").scrollTop = $("#chatArea").scrollHeight; });
}
function showTyping(cb){
  const row = el("div","msgRow bot");
  const bubble = el("div","bubble typingBubble","<span></span><span></span><span></span>");
  row.appendChild(bubble);
  $("#chatArea").appendChild(row);
  scrollChatBottom();
  setTimeout(()=>{ row.remove(); cb(); }, 480);
}

/* =========================================================
   PROGRESS
========================================================= */
function updateProgress(){
  const total = state.steps.length || 1;
  const idx = Math.min(state.stepIndex, total);
  const pct = Math.round((idx/total)*100);
  $("#progressBar").style.width = pct + "%";
}

/* =========================================================
   FLOW ENGINE
========================================================= */
function startFlow(fresh){
  if(fresh){
    state.answers = {};
    state.answerDisplay = {};
    state.stepIndex = 0;
    state.steps = BASE_STEPS_1.slice();
    state.finished = false;
    $("#chatArea").innerHTML = "";
    addBotMessage(escapeHtml(t().ui.welcomeMsg));
    saveState();
  }
  renderCurrentStep();
}

function extendStepsAfterTipo(tipo){
  state.steps = BASE_STEPS_1.concat(BASE_STEPS_2, DETAIL_STEPS[tipo] || [], TAIL_STEPS);
  const presetId = TIPO_SUBTIPO_PRESET[tipo];
  if(presetId){
    const opt = (t().q.viviendaSubtipo.opts || []).find(o=>o.id===presetId);
    if(opt){
      state.answers.viviendaSubtipo = opt.id;
      state.answerDisplay.viviendaSubtipo = opt.label;
    }
  }
}

function renderCurrentStep(){
  updateProgress();
  const stepId = state.steps[state.stepIndex];
  if(!stepId){ return; }
  if(stepId === SUMMARY_STEP){
    renderSummaryStep();
    return;
  }
  const qData = t().q[stepId];
  showTyping(()=>{
    addBotMessage(escapeHtml(qData.q));
    renderInputForStep(stepId, qData);
  });
}

function renderInputForStep(stepId, qData){
  const area = $("#inputArea");
  area.innerHTML = "";

  // back link (not on first step)
  if(state.stepIndex > 0){
    const back = el("button","backLink", "&larr; " + escapeHtml(t().ui.back));
    back.onclick = goBack;
    area.appendChild(back);
  }

  if(CHOICE_STEPS.has(stepId)){
    const grid = el("div","optionsGrid");
    qData.opts.forEach(opt=>{
      const btn = el("button","optBtn "+(qData.opts.length<=3?"wide":""), (opt.ic? `<span class="ic">${opt.ic}</span>`:"") + escapeHtml(opt.label));
      btn.onclick = ()=> submitAnswer(stepId, opt.id, opt.label);
      grid.appendChild(btn);
    });
    area.appendChild(grid);
    return;
  }

  if(MULTI_STEPS.has(stepId)){
    const hint = el("div","hint", escapeHtml(t().ui.selectMultiHint));
    area.appendChild(hint);
    const grid = el("div","optionsGrid");
    const selected = new Set();
    qData.opts.forEach(opt=>{
      const btn = el("button","optBtn", (opt.ic? `<span class="ic">${opt.ic}</span>`:"") + escapeHtml(opt.label));
      btn.onclick = ()=>{
        if(selected.has(opt.id)){ selected.delete(opt.id); btn.classList.remove("selected"); }
        else{ selected.add(opt.id); btn.classList.add("selected"); }
      };
      grid.appendChild(btn);
    });
    area.appendChild(grid);
    const confirmBtn = el("button","btnPrimary", escapeHtml(t().ui.confirmMulti));
    confirmBtn.style.marginTop="10px"; confirmBtn.style.width="100%";
    confirmBtn.onclick = ()=>{
      const ids = Array.from(selected);
      const labels = qData.opts.filter(o=>ids.includes(o.id)).map(o=>o.label);
      const displayText = labels.length? labels.join(", ") : (state.lang==='ar'?"لا شيء":"—");
      submitAnswer(stepId, ids, displayText);
    };
    area.appendChild(confirmBtn);
    return;
  }

  if(stepId === ZONE_STEP){
    const chipsRow = el("div","chipsRow");
    CITY_CHIPS.forEach(city=>{
      const chip = el("button","chip", escapeHtml(city));
      chip.onclick = ()=> submitAnswer(stepId, city, city);
      chipsRow.appendChild(chip);
    });
    area.appendChild(chipsRow);
    buildTextInput(area, stepId, t().ui.placeholderZone, validateZone, t().ui.errZone);
    return;
  }

  if(stepId === NATION_STEP){
    const chipsRow = el("div","chipsRow");
    qData.chips.forEach(nat=>{
      const chip = el("button","chip", escapeHtml(nat));
      chip.onclick = ()=> submitAnswer(stepId, nat, nat);
      chipsRow.appendChild(chip);
    });
    const otherChip = el("button","chip", escapeHtml(qData.other));
    chipsRow.appendChild(otherChip);
    area.appendChild(chipsRow);
    const inputWrap = buildTextInput(area, stepId, t().ui.otherPlaceholder, (v)=>v.trim().length>=2, t().ui.errRequired);
    otherChip.onclick = ()=>{ inputWrap.input.focus(); };
    return;
  }

  if(TEXT_STEPS.has(stepId)){
    let placeholder, validator, errMsg;
    if(stepId === "nombre"){ placeholder=t().ui.placeholderName; validator=validateName; errMsg=t().ui.errName; }
    else if(stepId === "email"){ placeholder=t().ui.placeholderEmail; validator=validateEmail; errMsg=t().ui.errEmail; }
    else if(stepId === "telefono"){ placeholder=t().ui.placeholderPhone; validator=validatePhone; errMsg=t().ui.errPhone; }
    else { placeholder=t().ui.placeholderSuperficie; validator=validateNumberish; errMsg=t().ui.errRequired; }
    buildTextInput(area, stepId, placeholder, validator, errMsg, stepId==="telefono"?"tel":(stepId==="email"?"email":"text"));
    return;
  }
}

function buildTextInput(area, stepId, placeholder, validator, errMsg, type){
  const row = el("div","textInputRow");
  const input = document.createElement("input");
  input.type = type || "text";
  input.placeholder = placeholder;
  input.autocomplete = "off";
  row.appendChild(input);
  const sendBtn = el("button","sendBtn","<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><line x1='22' y1='2' x2='11' y2='13'/><polygon points='22 2 15 22 11 13 2 9 22 2'/></svg>");
  row.appendChild(sendBtn);
  area.appendChild(row);
  const err = el("div","errMsg", "⚠ " + escapeHtml(errMsg));
  area.appendChild(err);

  function trySubmit(){
    const val = input.value.trim();
    if(!val || !validator(val)){
      err.classList.add("show");
      input.focus();
      return;
    }
    err.classList.remove("show");
    submitAnswer(stepId, val, val);
  }
  sendBtn.onclick = trySubmit;
  input.addEventListener("keydown", (e)=>{ if(e.key==="Enter"){ e.preventDefault(); trySubmit(); } });
  setTimeout(()=>input.focus(), 50);
  return {input, row};
}

function goBack(){
  if(state.stepIndex <= 0) return;
  state.stepIndex -= 1;
  const stepId = state.steps[state.stepIndex];
  delete state.answers[stepId];
  delete state.answerDisplay[stepId];
  saveState();
  renderCurrentStep();
}

function submitAnswer(stepId, value, displayText){
  state.answers[stepId] = value;
  state.answerDisplay[stepId] = displayText;
  addUserMessage(displayText);

  if(stepId === "tipoPropiedad"){
    extendStepsAfterTipo(value);
  }

  state.stepIndex += 1;
  saveState();
  renderCurrentStep();
}

/* =========================================================
   SUMMARY + WHATSAPP
========================================================= */
function labelFor(stepId){
  const L = t().labels;
  const map = {
    objetivo:L.objetivo, tipoPropiedad:L.tipoPropiedad, zona:L.zona, presupuesto:L.presupuesto,
    viviendaSubtipo:L.subtipo, viviendaHabitaciones:L.habitaciones, viviendaBanos:L.banos,
    viviendaSuperficie:L.superficie, viviendaExtras:L.extras, viviendaEstado:L.estado,
    terrenoUso:L.uso, terrenoSuperficie:L.superficie, terrenoTitulado:L.titulado,
    comercialSubtipo:L.subtipo, comercialSuperficie:L.superficie, comercialPlanta:L.planta,
    garajePlazas:L.plazas, garajeTipo:L.tipoGaraje, garajeUbicacion:L.ubicacionGaraje,
    plazo:L.plazo, gestion:L.gestion, nacionalidad:L.nacionalidad,
    nombre:L.nombre, email:L.email, telefono:L.telefono
  };
  return map[stepId] || stepId;
}

function renderSummaryStep(){
  showTyping(()=>{
    addBotMessage("<b>" + escapeHtml(t().ui.summaryTitle) + "</b>");
    const area = $("#inputArea");
    area.innerHTML = "";

    const back = el("button","backLink", "&larr; " + escapeHtml(t().ui.back));
    back.onclick = goBack;
    area.appendChild(back);

    const card = el("div","summaryCard");
    state.steps.forEach(sid=>{
      if(sid === SUMMARY_STEP) return;
      const disp = state.answerDisplay[sid];
      if(disp === undefined) return;
      const row = el("div","summaryRow");
      row.appendChild(el("div","k", escapeHtml(labelFor(sid))));
      row.appendChild(el("div","v", escapeHtml(disp)));
      card.appendChild(row);
    });
    area.appendChild(card);

    const rowBtns = el("div","rowBtns");
    const editBtn = el("button","btnGhost", escapeHtml(t().ui.edit));
    editBtn.onclick = ()=>{ state.stepIndex = 0; state.answers={}; state.answerDisplay={}; state.steps = BASE_STEPS_1.slice(); saveState(); startFlow(true); };
    const confirmBtn = el("button","btnPrimary", escapeHtml(t().ui.confirmSend));
    confirmBtn.onclick = renderFinalSend;
    rowBtns.appendChild(editBtn);
    rowBtns.appendChild(confirmBtn);
    area.appendChild(rowBtns);

    state.finished = true;
    saveState();
  });
}

function buildWhatsAppMessage(){
  const L = t().labels, WA = t().wa, A = state.answerDisplay;
  const now = new Date();
  const dateStr = now.toLocaleDateString(state.lang==='ar'?'ar-MA':state.lang, {year:'numeric', month:'2-digit', day:'2-digit'}) + " " + now.toLocaleTimeString(state.lang, {hour:'2-digit', minute:'2-digit'});

  const lines = [];
  lines.push(`*${WA.title}*`);
  lines.push(`_${WA.origin}_`);
  lines.push(`${WA.date}: ${dateStr}`);
  lines.push("");
  lines.push(`*${WA.sectionRequest}*`);
  pushIf(lines, L.objetivo, A.objetivo);
  pushIf(lines, L.tipoPropiedad, A.tipoPropiedad);
  pushIf(lines, L.zona, A.zona);
  pushIf(lines, L.presupuesto, A.presupuesto);
  lines.push("");
  lines.push(`*${WA.sectionProperty}*`);
  ["viviendaSubtipo","viviendaHabitaciones","viviendaBanos","viviendaSuperficie","viviendaExtras","viviendaEstado",
   "terrenoUso","terrenoSuperficie","terrenoTitulado",
   "comercialSubtipo","comercialSuperficie","comercialPlanta",
   "garajePlazas","garajeTipo","garajeUbicacion"].forEach(k=>{
    if(A[k] !== undefined) pushIf(lines, labelFor(k), A[k]);
  });
  pushIf(lines, L.plazo, A.plazo);
  pushIf(lines, L.gestion, A.gestion);
  lines.push("");
  lines.push(`*${WA.sectionContact}*`);
  pushIf(lines, L.nacionalidad, A.nacionalidad);
  pushIf(lines, L.nombre, A.nombre);
  pushIf(lines, L.email, A.email);
  pushIf(lines, L.telefono, A.telefono);
  lines.push("");
  lines.push(`_${WA.footer}_`);

  return lines.join("\n");
}
function pushIf(lines, label, value){
  if(value !== undefined && value !== null && value !== "") lines.push(`*${label}:* ${value}`);
}

function renderFinalSend(){
  const area = $("#inputArea");
  const msg = buildWhatsAppMessage();
  const url = "https://wa.me/" + WHATSAPP_NUMBER + "?text=" + encodeURIComponent(msg);

  addBotMessage(escapeHtml(t().ui.confirmSend));
  area.innerHTML = "";

  // Open WhatsApp straight away (this runs synchronously inside the user's
  // click, so browsers won't block it as a pop-up). The button + copy
  // fallback below still cover cases where it doesn't open automatically.
  window.open(url, "_blank");

  const waBtn = el("button","whatsBtn", "<svg viewBox='0 0 24 24' fill='currentColor'><path d='M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.52.148-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.148-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z'/><path d='M12.012 2C6.494 2 2.014 6.48 2.014 12c0 1.977.577 3.822 1.573 5.373L2 22l4.767-1.554A9.94 9.94 0 0012.012 22C17.53 22 22 17.52 22 12S17.53 2 12.012 2zm0 18.2a8.18 8.18 0 01-4.166-1.14l-.299-.177-2.828.922.93-2.756-.194-.283A8.19 8.19 0 013.81 12c0-4.522 3.68-8.2 8.202-8.2 4.523 0 8.2 3.678 8.2 8.2 0 4.523-3.677 8.2-8.2 8.2z'/></svg> " + escapeHtml(t().ui.whatsappBtn));
  waBtn.onclick = ()=>{ window.open(url, "_blank"); };
  area.appendChild(waBtn);

  const fallback = el("div","hint", escapeHtml(t().ui.whatsappFallback));
  fallback.style.marginTop = "10px";
  area.appendChild(fallback);

  const copyRow = el("div","copyRow");
  const copyBtn = el("button","btnGhost", escapeHtml(t().ui.copy));
  copyRow.appendChild(copyBtn);
  area.appendChild(copyRow);

  const box = el("div","copyBox show", escapeHtml(msg));
  area.appendChild(box);

  copyBtn.onclick = ()=>{
    navigator.clipboard.writeText(msg).then(()=>{
      copyBtn.textContent = t().ui.copied;
      setTimeout(()=>{ copyBtn.textContent = t().ui.copy; }, 1800);
    }).catch(()=>{});
  };

  window.open(url, "_blank");
  saveState();
}

/* =========================================================
   LANGUAGE SELECTOR / HEADER
========================================================= */
function renderLangRow(){
  const row = $("#langRow");
  row.innerHTML = "";
  LANGS.forEach(l=>{
    const btn = el("button","langBtn"+(l.code===state.lang?" active":""), `${l.flag} <span class="code">${l.label}</span>`);
    btn.onclick = ()=> onLanguageChange(l.code);
    row.appendChild(btn);
  });
}

function applyStaticTexts(){
  const ui = t().ui;
  document.documentElement.lang = state.lang;
  document.body.dir = t().dir;
  document.documentElement.dir = t().dir;
  $("#tHeaderTitle").textContent = ui.headerTitle;
  $("#tHeaderSubtitle").textContent = ui.headerSubtitle;
  $("#tResetBtn").textContent = ui.resetBtn;
  $("#tResumeTitle").textContent = ui.resumeTitle;
  $("#tResumeText").textContent = ui.resumeText;
  $("#resumeRestartBtn").textContent = ui.resumeRestart;
  $("#resumeContinueBtn").textContent = ui.resumeContinue;
  document.title = ui.headerTitle + " — " + ui.headerSubtitle;
}

function onLanguageChange(code){
  if(code === state.lang) return;
  state.lang = code;
  renderLangRow();
  applyStaticTexts();
  clearState();
  startFlow(true);
}

/* =========================================================
   RESET
========================================================= */
function confirmReset(){
  const ui = t().ui;
  const area = $("#inputArea");
  addBotMessage("⚠ " + escapeHtml(ui.resetConfirm));
  area.innerHTML = "";
  const rowBtns = el("div","rowBtns");
  const cancelBtn = el("button","btnGhost", escapeHtml(ui.no));
  const okBtn = el("button","btnPrimary", escapeHtml(ui.yes));
  cancelBtn.onclick = ()=>{ renderCurrentStepAfterCancel(); };
  okBtn.onclick = ()=>{ clearState(); startFlow(true); };
  rowBtns.appendChild(cancelBtn);
  rowBtns.appendChild(okBtn);
  area.appendChild(rowBtns);
}
function renderCurrentStepAfterCancel(){
  // Re-render input for the step we were on (without repeating bot question bubble)
  const stepId = state.steps[state.stepIndex];
  if(!stepId){ return; }
  if(stepId === SUMMARY_STEP){ renderSummaryStep(); return; }
  const qData = t().q[stepId];
  renderInputForStep(stepId, qData);
}

/* =========================================================
   INIT
========================================================= */
function init(){
  renderLangRow();
  applyStaticTexts();

  const saved = loadState();
  if(saved && saved.steps && saved.steps.length && !saved.finished && saved.stepIndex > 0){
    state.lang = saved.lang || "es";
    renderLangRow();
    applyStaticTexts();
    $("#resumeBanner").style.display = "flex";
    $("#resumeContinueBtn").onclick = ()=>{
      state.answers = saved.answers || {};
      state.answerDisplay = saved.answerDisplay || {};
      state.steps = saved.steps || BASE_STEPS_1.slice();
      state.stepIndex = saved.stepIndex || 0;
      state.finished = saved.finished || false;
      $("#chatArea").innerHTML = saved.chatHTML || "";
      $("#resumeBanner").style.display = "none";
      scrollChatBottom();
      updateProgress();
      if(state.finished){ renderSummaryStep(); } else { renderCurrentStep(); }
    };
    $("#resumeRestartBtn").onclick = ()=>{
      $("#resumeBanner").style.display = "none";
      clearState();
      startFlow(true);
    };
  } else {
    clearState();
    startFlow(true);
  }

  $("#resetBtn").onclick = confirmReset;
}

document.addEventListener("DOMContentLoaded", init);
})();
</script>
</body>
</html>
